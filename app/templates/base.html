<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="IE=edge" http-equiv="X-UA-Compatible">
    <meta content="MG Brandworks India | Let's bring your brand to life." name="description">

    <title>{% block title %}MG Brandworks India{% endblock %}</title>

    <link href="{{ url_for('static', filename='css/base.css') }}" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    {% block extra_css %}{% endblock %}
</head>
<body>

    <nav>
        <div class="nav-container">
            <div class="nav-logo">
                <a href="{{ url_for('home.index') }}">
                    <img alt="MG Logo" src="{{ url_for('static', filename='images/mgb_logo.jpeg') }}">
                </a>
            </div>

            <div class="burger-menu" id="burger-menu">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <ul class="nav-links" id="nav-links">
                <li><a href="{{ url_for('home.index') }}">Home</a></li>
                <li><a href="{{ url_for('about.index') }}">About</a></li>
                <li><a href="{{ url_for('about.index') }}">Services</a></li>
                <li><a href="{{ url_for('contact.index') }}">Contact</a></li>
            </ul>
        </div>
    </nav>

    <main>
        {% block body %}{% endblock %}
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 MG&trade; Brandworks India. All Rights Reserved.</p>
    </footer>

    <script>
        const burger = document.getElementById('burger-menu');
        const navLinks = document.getElementById('nav-links');

        if (burger) {
            burger.addEventListener('click', () => {
                navLinks.classList.toggle('active');
                burger.classList.toggle('active');
            });
        }
    </script>

    {% block extra_js %}{% endblock %}

</body>
</html>
