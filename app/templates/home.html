{% extends 'base.html' %}

{% block title %}
Home | MG&trade; Brandworks India
{% endblock %}

{% block extra_css %}
    <link href="{{ url_for('static', filename='css/home.css') }}" rel="stylesheet">
{% endblock %}

{% block body %}
<div class="home-hero">
    <div class="hero-left">
        <div class="hero-title-area">
            <h1 class="brand-name">MG<br>BRANDWORKS<br>INDIA</h1>
        </div>

        <div class="hero-subtitle-area">
            <h3 class="tagline">let's bring your brand to life...</h3>

            <div class="hero-buttons">
                <a href="{{ url_for('projects.index') }}" class="cta-button btn-home-white">Let's Go!</a>
                <a href="{{ url_for('about.index') }}" class="cta-button btn-home-azure">Learn More</a>
            </div>
        </div>
    </div>

    <div class="hero-right">
        <div class="portrait-box">
            <img src="{{ url_for('static', filename='images/founder.jpg') }}" alt="Founder" class="portrait-img">
        </div>
    </div>
</div>
{% endblock %}
