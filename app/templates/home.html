{% extends 'base.html' %}

{% block title %}
Home | MG&trade; Brandworks India
{% endblock %}

{% block extra_css %}
    <link href="{{ url_for('static', filename='css/home.css') }}" rel="stylesheet">
{% endblock %}

{% block body %}
<div class="home-hero">
    <div class="hero-bg-container">
        <img alt="Founder" class="hero-bg-image" src="{{ url_for('static', filename='images/founder.jpg') }}">
        <div class="tint-overlay"></div>
    </div>
    <div class="hero-content">
        <h1 class="brand-name">MG BRANDWORKS INDIA</h1>
        <h3 class="tagline">let's bring your brand to life...</h3>

        <div class="hero-buttons">
            <a href="{{ url_for('projects.index') }}" class="cta-button btn-home-white">Let's Go!</a>
            <a href="{{ url_for('about.index') }}" class="cta-button btn-home-azure">Learn More</a>
        </div>
    </div>
</div>
{% endblock %}
